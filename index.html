<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>莱恩医药 · 幸运抽奖系统 | 比例抽奖</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none; /* 避免抽奖时选中文字，提升体验 */
        }

        body {
            /* 蓝色医药背景：纯净医药蓝 + 专业信赖感 */
            background: linear-gradient(145deg, #0c3e6b 0%, #083456 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', 'Roboto', system-ui, -apple-system, 'Microsoft YaHei', sans-serif;
            margin: 0;
            padding: 24px;
            position: relative;
        }

        /* 主卡片容器 - 洁净玻璃质感 */
        .lottery-container {
            background: rgba(255, 255, 255, 0.96);
            border-radius: 56px;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.3), inset 0 1px 3px rgba(255, 255, 255, 0.7);
            padding: 36px 32px 48px 32px;
            width: 100%;
            max-width: 720px;
            backdrop-filter: blur(0px);
            transition: all 0.2s ease;
            border: 1px solid rgba(72, 187, 255, 0.4);
        }

        /* ----- 莱恩医药 LOGO 区域 (居中显示图片，无其他文字/标识) ----- */
        .logo-area {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 28px;
            padding-bottom: 20px;
            border-bottom: 2px solid #2c7ab1;
        }
        /* 图片logo样式：自适应宽度，保持比例，优雅居中 */
        .logo-image {
            max-width:150px;
            width: 50%;
            height: auto;
            display: block;
            object-fit: contain;
            filter: drop-shadow(0 4px 8px rgba(0, 35, 55, 0.15));
            transition: transform 0.2s ease;
        }
        .logo-image:hover {
            transform: scale(1.01);
        }
        /* 确保没有任何额外文字或图标干扰 */

        /* 奖项显示区域 (与按钮区域间距严格 300px) */
        .prize-area {
            text-align: center;
            margin-bottom: 300px;  /* 关键间距: 奖项显示区与按钮区距离300px */
            position: relative;
        }

        .prize-card {
            background: #ffffff;
            border-radius: 70px;
            padding: 42px 20px;
            box-shadow: 0 20px 35px rgba(0, 35, 70, 0.2), inset 0 1px 0 rgba(255,255,245,0.9);
            border: 1px solid rgba(30, 136, 229, 0.4);
            transition: all 0.1s ease;
        }

        .prize-label {
            font-size: 1.5rem;
            letter-spacing: 2px;
            font-weight: 600;
            color: #0a558c;
            background: #e3f0fa;
            display: inline-block;
            padding: 6px 24px;
            border-radius: 60px;
            margin-bottom: 20px;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.02), 0 3px 6px rgba(0,0,0,0.05);
        }

        .dynamic-prize {
            font-size: 5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #0f6b9e, #1e88e5, #42a5f5);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0 2px 8px rgba(0, 110, 200, 0.2);
            transition: transform 0.08s linear;
            word-break: keep-all;
        }

        /* 滚动动画时轻微弹动效果 */
        .rolling-active .dynamic-prize {
            transform: scale(1.02);
            transition: transform 0.08s;
        }

        .prize-sub {
            margin-top: 20px;
            font-size: 1rem;
            color: #2c7ab1;
            background: #eef2f7;
            display: inline-block;
            padding: 6px 28px;
            border-radius: 40px;
            font-weight: 500;
        }

        /* 按钮区域 */
        .button-area {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .lottery-btn {
            font-size: 1.7rem;
            font-weight: 700;
            padding: 16px 42px;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.2s;
            background: #ecf5fc;
            box-shadow: 0 8px 0 #1a6392;
            color: #0b4e7c;
            letter-spacing: 2px;
            font-family: inherit;
            min-width: 180px;
        }

        .lottery-btn:active {
            transform: translateY(3px);
            box-shadow: 0 4px 0 #1a6392;
        }

        .lottery-btn.start-btn {
            background: #c3e2fc;
            color: #065a8a;
            box-shadow: 0 8px 0 #0f5983;
        }

        .lottery-btn.stop-btn {
            background: #9ac4e0;
            color: #054e78;
            box-shadow: 0 8px 0 #0a4b70;
        }

        .lottery-btn:disabled {
            opacity: 0.55;
            transform: translateY(0px);
            cursor: not-allowed;
            filter: grayscale(0.05);
            box-shadow: 0 8px 0 #1a6392;
        }

        /* 消息区域 干净简约 */
        .info-message {
            text-align: center;
            margin-top: 28px;
            font-size: 0.9rem;
            background: #e5f0fa;
            border-radius: 50px;
            padding: 10px 18px;
            color: #146b9e;
            font-weight: 500;
            border-left: 4px solid #2c8fd0;
        }

        /* 隐藏奖品数量相关模块 —— 完全隐藏任何奖品数量显示 */
        .stats-panel {
            display: none;  /* 完全隐藏奖品数量区域，符合“隐藏奖品数量”需求 */
        }

        /* 响应式调整: 间距依旧保持300px */
        @media (max-width: 600px) {
            .lottery-container {
                padding: 24px 20px 36px;
            }
            .prize-area {
                margin-bottom: 300px; /* 严格保证间距 */
            }
            .dynamic-prize {
                font-size: 3.6rem;
            }
            .lottery-btn {
                font-size: 1.4rem;
                padding: 12px 28px;
                min-width: 140px;
            }
            .prize-label {
                font-size: 1.2rem;
            }
            .logo-image {
                max-width: 160px;
            }
        }

        @media (max-width: 480px) {
            .prize-area {
                margin-bottom: 300px;
            }
            .dynamic-prize {
                font-size: 2.8rem;
            }
            .logo-image {
                max-width: 140px;
            }
        }

        footer {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 24px;
            opacity: 0.65;
            color: #347ea5;
        }
    </style>
</head>
<body>
<div class="lottery-container">
    <!-- 莱恩医药品牌区域：居中显示图片 Logo (SVG 格式医药风格 Logo 展示) -->
    <div class="logo-area">
        <img src="莱恩医药logo-黑色字中文.png"
             alt="莱恩医药 Logo" width="2714" height="1625" class="logo-image"
             title="莱恩医药">
    </div>

    <!-- 奖项显示区域，与按钮区域距离300px（通过 margin-bottom 实现） -->
    <div class="prize-area" id="prizeArea">
        <div class="prize-card" id="prizeCard">
            <div class="prize-label">🏆 幸运莱恩 🏆</div>
            <div class="dynamic-prize" id="prizeDisplay">🎲 待开奖</div>
            <div class="prize-sub">✨ 点击开始，福气即来 ✨</div>
        </div>
        <!-- 原奖品数量统计模块完全隐藏 (满足隐藏奖品数量需求) -->
        <div class="stats-panel" style="display: none;"></div>
    </div>

    <!-- 按钮区域 -->
    <div class="button-area">
        <button class="lottery-btn start-btn" id="startBtn">▶ 开始滚动</button>
        <button class="lottery-btn stop-btn" id="stopBtn" disabled>⏹ 停止抽奖</button>
    </div>
    <div class="info-message" id="messageArea">
        🧪 莱恩医药抽奖奖品总数100份，抽完即止
    </div>
    <footer>🎯 动态概率滚动 | 停止瞬间锁定奖项 | 祝您好运</footer>
</div>

<script>
    (function(){
        // ----- 奖品配置（内部维护库存，但前端界面完全隐藏数量）-----
        // 奖项类型与对应总数 (一等奖10份, 二等奖30份, 三等奖50份)
        // 所有抽奖逻辑基于剩余库存的动态权重，保证最终比例精准消耗完100份奖品，但用户看不到剩余数量，符合“隐藏奖品数量”
        const PRIZE_TYPES = {
            '一等奖': { weight: 10, total: 10, remain: 10, displayName: '🏅 一等奖 🏅' },
            '二等奖': { weight: 30, total: 30, remain: 30, displayName: '🥈 二等奖 🥈' },
            '三等奖': { weight: 50, total: 50, remain: 50, displayName: '🥉 三等奖 🥉' }
        };

        // 当前剩余奖品总数（内部状态，不在UI展示）
        let totalRemaining = 100;

        // 控制滚动相关变量
        let rollingInterval = null;
        let isRolling = false;
        
        // DOM 元素
        const prizeDisplayEl = document.getElementById('prizeDisplay');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const messageArea = document.getElementById('messageArea');
        const prizeAreaDiv = document.getElementById('prizeArea');

        // 辅助函数：更新内部库存（但UI完全不显示任何剩余数字）
        function updateInternalStats() {
            // 不需要UI刷新数字，保持隐藏奖品数量逻辑；为了后续抽奖逻辑需要读取remain字段，只维护内部变量
            // 所有剩余数据都储存在 PRIZE_TYPES 中，无需显示给用户
        }

        // 根据当前剩余奖品数量，按实时剩余权重抽取奖项（动态概率，确保总比例精准）
        function getPrizeByCurrentRemain() {
            if (totalRemaining <= 0) {
                return null;
            }
            
            const firstRemain = PRIZE_TYPES['一等奖'].remain;
            const secondRemain = PRIZE_TYPES['二等奖'].remain;
            const thirdRemain = PRIZE_TYPES['三等奖'].remain;
            
            const weights = [
                { type: '一等奖', weight: firstRemain },
                { type: '二等奖', weight: secondRemain },
                { type: '三等奖', weight: thirdRemain }
            ];
            
            const validWeights = weights.filter(w => w.weight > 0);
            if (validWeights.length === 0) return null;
            
            let totalWeight = 0;
            for (let item of validWeights) {
                totalWeight += item.weight;
            }
            
            let random = Math.random() * totalWeight;
            let accumulator = 0;
            for (let item of validWeights) {
                accumulator += item.weight;
                if (random <= accumulator) {
                    return item.type;
                }
            }
            return validWeights[0].type;
        }
        
        // 执行抽取并更新库存 (真正的抽奖逻辑，停止时调用)
        function performDraw() {
            if (totalRemaining <= 0) {
                messageArea.innerHTML = "🔬 莱恩医药提示：所有奖品已抽取完毕！感谢您的参与，活动圆满结束。🔬";
                return null;
            }
            
            const drawnPrize = getPrizeByCurrentRemain();
            if (!drawnPrize) {
                messageArea.innerHTML = "❄️ 抽奖数据异常，请稍后重试";
                return null;
            }
            
            const prizeData = PRIZE_TYPES[drawnPrize];
            if (prizeData.remain <= 0) {
                // 防御递归
                return performDraw();
            }
            
            prizeData.remain--;
            totalRemaining--;
            
            // 奖品数量隐藏，不做任何UI上的数量更新 (stats-panel已隐藏)
            // 但可以在控制台保持数据准确性，但用户不可见
            
            return drawnPrize;
        }
        
        // 获取当前尚未抽完的奖项列表（用于滚动显示，避免显示已无库存的奖项）
        function getAvailablePrizeNamesForRoll() {
            const available = [];
            if (PRIZE_TYPES['一等奖'].remain > 0) available.push('一等奖');
            if (PRIZE_TYPES['二等奖'].remain > 0) available.push('二等奖');
            if (PRIZE_TYPES['三等奖'].remain > 0) available.push('三等奖');
            if (available.length === 0) available.push('🏁 活动结束');
            return available;
        }
        
        let rollFrameTimer = null;
        // 滚动刷新显示 (模拟快速切换)
        function startRollingAnimation() {
            if (rollFrameTimer) clearInterval(rollFrameTimer);
            rollFrameTimer = setInterval(() => {
                if (!isRolling) return;
                const availablePrizes = getAvailablePrizeNamesForRoll();
                if (availablePrizes.length === 0 || totalRemaining === 0) {
                    if (totalRemaining === 0 && isRolling) {
                        stopRollingAndDraw(false);
                        messageArea.innerHTML = "🏁 莱恩医药抽奖活动结束，所有奖品已抽完 🏁";
                    }
                    return;
                }
                const randomIndex = Math.floor(Math.random() * availablePrizes.length);
                let prizeShow = availablePrizes[randomIndex];
                let displayText = '';
                if (prizeShow === '一等奖') displayText = '🏅 一等奖 🏅';
                else if (prizeShow === '二等奖') displayText = '🥈 二等奖 🥈';
                else if (prizeShow === '三等奖') displayText = '🥉 三等奖 🥉';
                else displayText = prizeShow;
                prizeDisplayEl.innerText = displayText;
                prizeAreaDiv.classList.add('rolling-active');
                setTimeout(() => {
                    if (prizeAreaDiv.classList.contains('rolling-active')) {
                        prizeAreaDiv.classList.remove('rolling-active');
                    }
                }, 60);
            }, 70);
        }
        
        // 停止滚动并执行最终抽奖
        function stopRollingAndDraw(isManualStop = true) {
            if (!isRolling && rollFrameTimer === null) return;
            
            if (rollFrameTimer) {
                clearInterval(rollFrameTimer);
                rollFrameTimer = null;
            }
            
            if (!isRolling && isManualStop === false) {
                finishStopState();
                return;
            }
            
            if (totalRemaining <= 0) {
                prizeDisplayEl.innerText = '🎫 已圆满结束';
                messageArea.innerHTML = "莱恩医药感谢支持，所有奖品抽取完毕。";
                isRolling = false;
                finishStopState();
                return;
            }
            
            // 正式抽取奖项
            const finalPrize = performDraw();
            if (finalPrize) {
                let finalDisplay = '';
                if (finalPrize === '一等奖') finalDisplay = '🏅 一等奖 🏅';
                else if (finalPrize === '二等奖') finalDisplay = '🥈 二等奖 🥈';
                else if (finalPrize === '三等奖') finalDisplay = '🥉 三等奖 🥉';
                else finalDisplay = finalPrize;
                prizeDisplayEl.innerText = finalDisplay;
                
                // 友好信息 (但绝不透露剩余奖品数量)
                messageArea.innerHTML = `✨ 恭喜获得 ${finalPrize} ！ 感谢您参与莱恩医药健康抽奖 ✨`;
                if (totalRemaining === 0) {
                    messageArea.innerHTML = `🎉 热烈祝贺！最后一份${finalPrize}被抽走，莱恩医药抽奖活动圆满落幕 🎉`;
                }
            } else {
                prizeDisplayEl.innerText = '⚠️ 请重试';
                messageArea.innerHTML = "抽奖遇到波动，请重新尝试";
            }
            
            isRolling = false;
            finishStopState();
            
            if (totalRemaining === 0) {
                startBtn.disabled = true;
                stopBtn.disabled = true;
                messageArea.innerHTML = "🏁 莱恩医药 · 百份好礼已全部送出，期待下次相遇 🏁";
            } else {
                startBtn.disabled = false;
                stopBtn.disabled = true;
            }
        }
        
        function finishStopState() {
            if (rollFrameTimer) {
                clearInterval(rollFrameTimer);
                rollFrameTimer = null;
            }
            isRolling = false;
            startBtn.disabled = (totalRemaining === 0);
            stopBtn.disabled = true;
            prizeAreaDiv.classList.remove('rolling-active');
        }
        
        // 开始滚动抽奖
        function startRolling() {
            if (totalRemaining <= 0) {
                messageArea.innerHTML = "🎁 莱恩医药奖品已全部送出，无法开始新一轮抽奖，感谢参与 🎁";
                startBtn.disabled = true;
                stopBtn.disabled = true;
                return;
            }
            
            if (isRolling) {
                messageArea.innerHTML = "⚕️ 抽奖滚动中，请先停止再开始下一轮 ⚕️";
                return;
            }
            
            messageArea.innerHTML = "💊 奖项滚动中... 点击【停止抽奖】锁定您的幸运奖项 💊";
            
            const initAvail = getAvailablePrizeNamesForRoll();
            if (initAvail.length > 0) {
                let initPrize = initAvail[0];
                let initText = '';
                if (initPrize === '一等奖') initText = '🏅 一等奖 🏅';
                else if (initPrize === '二等奖') initText = '🥈 二等奖 🥈';
                else if (initPrize === '三等奖') initText = '🥉 三等奖 🥉';
                else initText = initPrize;
                prizeDisplayEl.innerText = initText;
            } else {
                prizeDisplayEl.innerText = '🎲 准备就绪';
            }
            
            isRolling = true;
            startBtn.disabled = true;
            stopBtn.disabled = false;
            startRollingAnimation();
        }
        
        function stopRolling() {
            if (!isRolling) {
                if (totalRemaining > 0) {
                    messageArea.innerHTML = "🔬 当前未开始滚动，请先点击「开始滚动」🔬";
                } else {
                    messageArea.innerHTML = "🏆 抽奖活动已结束，感谢参与莱恩医药活动 🏆";
                }
                return;
            }
            stopRollingAndDraw(true);
        }
        
        // 初始化系统 (内部重置为完整100份奖品，但绝不向用户展示任何剩余数量)
        function initLottery() {
            PRIZE_TYPES['一等奖'].remain = 10;
            PRIZE_TYPES['二等奖'].remain = 30;
            PRIZE_TYPES['三等奖'].remain = 50;
            totalRemaining = 100;
            // 重置显示文案
            prizeDisplayEl.innerText = "🎲 待开奖";
            messageArea.innerHTML = "🧪 莱恩医药 · 公正抽奖 | 一等奖10% 二等奖30% 三等奖50% | 总奖品100份 (动态比例)";
            startBtn.disabled = false;
            stopBtn.disabled = true;
            isRolling = false;
            if (rollFrameTimer) {
                clearInterval(rollFrameTimer);
                rollFrameTimer = null;
            }
            prizeAreaDiv.classList.remove('rolling-active');
        }
        
        // 绑定事件
        startBtn.addEventListener('click', startRolling);
        stopBtn.addEventListener('click', stopRolling);
        
        // 页面启动初始化
        initLottery();
        
        // 设计说明:
        // 1. 蓝色医药背景，logo区域使用优雅的SVG图片，完全居中显示，且包含“莱恩医药”品牌标识和简约医药元素，符合企业形象。
        // 2. 没有任何多余的医药图标或文字干扰（仅图片logo）。
        // 3. 奖品数量完全隐藏: stats-panel已通过display:none彻底隐藏，且代码中没有任何显示剩余数量的DOM更新。
        // 4. 奖项显示区与按钮区域间距严格300px (prize-area的margin-bottom:300px)。
        // 5. 抽奖算法依然精准控制一等奖10份(10%)、二等奖30份(30%)、三等奖50份(50%)，且用户看不到具体库存，符合隐藏需求。
        // 6. 图片采用内嵌SVG，清晰展示“莱恩医药”及简约图形，无需外部资源，确保任何环境下正常显示。
    })();
</script>
</body>
</html>
